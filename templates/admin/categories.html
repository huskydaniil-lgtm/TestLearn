{% extends "admin_base.html" %}

{% block admin_content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold text-gray-700">Управление категориями</h2>
        <button id="addCategoryBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
            Добавить категорию
        </button>
    </div>

    <!-- Форма добавления/редактирования категории (в модальном окне или на странице) -->
    <div id="categoryFormContainer" class="hidden bg-gray-50 p-4 rounded-lg">
        <h3 class="text-lg font-medium text-gray-800 mb-4" id="categoryFormTitle">Добавить новую категорию</h3>
        <form id="categoryForm" class="space-y-4">
            <input type="hidden" id="categoryId">
            <div>
                <label for="categoryName" class="block text-sm font-medium text-gray-700 mb-1">Название</label>
                <input type="text" id="categoryName" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="categorySlug" class="block text-sm font-medium text-gray-700 mb-1">Slug (латинские буквы, цифры, дефисы)</label>
                <input type="text" id="categorySlug" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="categoryDescription" class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
                <textarea id="categoryDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div>
                <label for="categoryIcon" class="block text-sm font-medium text-gray-700 mb-1">Иконка (класс из Font Awesome, например: check-circle)</label>
                <input type="text" id="categoryIcon" value="check-circle" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" id="cancelCategoryBtn" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition">Отмена</button>
                <button type="submit" id="saveCategoryBtn" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">Сохранить</button>
            </div>
        </form>
    </div>

    <!-- Список категорий -->
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Название</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Slug</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Иконка</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Тем</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Действия</th>
                </tr>
            </thead>
            <tbody id="categoriesTableBody" class="bg-white divide-y divide-gray-200">
                <!-- Строки будут заполнены через JavaScript -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const formContainer = document.getElementById('categoryFormContainer');
    const formTitle = document.getElementById('categoryFormTitle');
    const categoryForm = document.getElementById('categoryForm');
    const categoryIdInput = document.getElementById('categoryId');
    const addCategoryBtn = document.getElementById('addCategoryBtn');
    const cancelCategoryBtn = document.getElementById('cancelCategoryBtn');
    const saveCategoryBtn = document.getElementById('saveCategoryBtn');
    const categoriesTableBody = document.getElementById('categoriesTableBody');

    // Загрузка категорий при загрузке страницы
    loadCategories();

    // Показать форму для добавления новой категории
    addCategoryBtn.addEventListener('click', function() {
        categoryFormTitle.textContent = 'Добавить новую категорию';
        categoryIdInput.value = '';
        categoryForm.reset();
        document.getElementById('categoryIcon').value = 'check-circle';
        formContainer.classList.remove('hidden');
    });

    // Отмена редактирования/добавления
    cancelCategoryBtn.addEventListener('click', function() {
        formContainer.classList.add('hidden');
    });

    // Сохранение категории
    categoryForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const id = categoryIdInput.value;
        const name = document.getElementById('categoryName').value.trim();
        const slug = document.getElementById('categorySlug').value.trim();
        const description = document.getElementById('categoryDescription').value.trim();
        const icon = document.getElementById('categoryIcon').value.trim() || 'check-circle';

        if (!name || !slug) {
            alert('Пожалуйста, заполните обязательные поля: название и slug');
            return;
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/admin/api/categories/${id}` : '/admin/api/categories';

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
                'name': name,
                'slug': slug,
                'description': description,
                'icon': icon
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            alert(id ? 'Категория успешно обновлена' : 'Категория успешно создана');
            loadCategories();
            formContainer.classList.add('hidden');
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
        });
    });

    // Функция загрузки категорий
    function loadCategories() {
        fetch('/admin/api/categories')
        .then(response => response.json())
        .then(categories => {
            categoriesTableBody.innerHTML = '';
            categories.forEach(cat => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${cat.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${cat.name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${cat.slug}</td>
                    <td class="px-6 py-4 whitespace-nowrap"><i class="fas fa-${cat.icon}"></i></td>
                    <td class="px-6 py-4 whitespace-nowrap">${cat.topic_count}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button class="edit-category btn px-2 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition mr-2" data-id="${cat.id}">Редактировать</button>
                        <button class="delete-category btn px-2 py-1 bg-red-600 text-white rounded hover:bg-red-700 transition" data-id="${cat.id}">Удалить</button>
                    </td>
                `;
                categoriesTableBody.appendChild(tr);
            });

            // Добавляем обработчики для кнопок редактирования и удаления
            document.querySelectorAll('.edit-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    editCategory(id);
                });
            });

            document.querySelectorAll('.delete-category').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    if (confirm('Вы уверены, что хотите удалить эту категорию? Это действие нельзя отменить.')) {
                        deleteCategory(id);
                    }
                });
            });
        })
        .catch(error => {
            console.error('Error loading categories:', error);
            categoriesTableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Ошибка загрузки категорий</td></tr>';
        });
    }

    // Функция редактирования категории
    function editCategory(id) {
        fetch(`/admin/api/categories/${id}`)
        .then(response => response.json())
        .then(cat => {
            categoryFormTitle.textContent = 'Редактировать категорию';
            categoryIdInput.value = cat.id;
            document.getElementById('categoryName').value = cat.name;
            document.getElementById('categorySlug').value = cat.slug;
            document.getElementById('categoryDescription').value = cat.description || '';
            document.getElementById('categoryIcon').value = cat.icon;
            formContainer.classList.remove('hidden');
        })
        .catch(error => {
            console.error('Error fetching category:', error);
            alert('Ошибка загрузки категории для редактирования');
        });
    }

    // Функция удаления категории
    function deleteCategory(id) {
        fetch(`/admin/api/categories/${id}`, {
            method: 'DELETE'
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            alert('Категория успешно удалена');
            loadCategories();
        })
        .catch(error => {
            console.error('Error deleting category:', error);
            alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
        });
    }
});
</script>
{% endblock %}
