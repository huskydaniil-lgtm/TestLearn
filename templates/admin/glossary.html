{% extends "admin_base.html" %}

{% block admin_content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold text-gray-700">Управление глоссарием</h2>
        <button id="addTermBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
            Добавить термин
        </button>
    </div>

    <!-- Фильтр по букве и поиск -->
    <div class="flex flex-wrap items-center gap-4 mb-4">
        <div>
            <label for="letterFilter" class="block text-sm font-medium text-gray-700 mb-1">Буква:</label>
            <select id="letterFilter" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="">Все буквы</option>
                <!-- Опции будут заполнены через JavaScript -->
            </select>
        </div>
        <div>
            <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-1">Поиск:</label>
            <input type="text" id="searchInput" placeholder="Поиск по термину или определению" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64">
        </div>
    </div>

    <!-- Форма добавления/редактирования термина -->
    <div id="termFormContainer" class="hidden bg-gray-50 p-4 rounded-lg">
        <h3 class="text-lg font-medium text-gray-800 mb-4" id="termFormTitle">Добавить новый термин</h3>
        <form id="termForm" class="space-y-4">
            <input type="hidden" id="termId">
            <div>
                <label for="termTerm" class="block text-sm font-medium text-gray-700 mb-1">Термин</label>
                <input type="text" id="termTerm" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="termDefinition" class="block text-sm font-medium text-gray-700 mb-1">Определение</label>
                <textarea id="termDefinition" rows="5" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div>
                <label for="termLetter" class="block text-sm font-medium text-gray-700 mb-1">Буква (один символ, будет автоматически определен из первого символа термина)</label>
                <input type="text" id="termLetter" maxlength="1" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Авто">
                <small class="text-gray-500">Если оставить пустым, будет использован первый символ термина (в верхнем регистре)</small>
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" id="cancelTermBtn" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition">Отмена</button>
                <button type="submit" id="saveTermBtn" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">Сохранить</button>
            </div>
        </form>
    </div>

    <!-- Список терминов -->
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Термин</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Буква</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Определение</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Действия</th>
                </tr>
            </thead>
            <tbody id="glossaryTableBody" class="bg-white divide-y divide-gray-200">
                <!-- Строки будут заполнены через JavaScript -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const formContainer = document.getElementById('termFormContainer');
    const formTitle = document.getElementById('termFormTitle');
    const termForm = document.getElementById('termForm');
    const termIdInput = document.getElementById('termId');
    const addTermBtn = document.getElementById('addTermBtn');
    const cancelTermBtn = document.getElementById('cancelTermBtn');
    const saveTermBtn = document.getElementById('saveTermBtn');
    const letterFilter = document.getElementById('letterFilter');
    const searchInput = document.getElementById('searchInput');
    const glossaryTableBody = document.getElementById('glossaryTableBody');

    // Загрузка терминов при загрузке страницы или изменении фильтра/поиска
    function loadGlossary() {
        const letter = letterFilter.value;
        const search = searchInput.value.trim();
        let url = '/admin/api/glossary';
        const params = new URLSearchParams();
        if (letter) {
            params.append('letter', letter);
        }
        if (search) {
            params.append('search', search);
        }
        if (params.toString()) {
            url += '?' + params.toString();
        }
        fetch(url)
        .then(response => response.json())
        .then(terms => {
            glossaryTableBody.innerHTML = '';
            terms.forEach(term => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${term.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${term.term}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${term.letter}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${term.definition}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button class="edit-term btn px-2 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition mr-2" data-id="${term.id}">Редактировать</button>
                        <button class="delete-term btn px-2 py-1 bg-red-600 text-white rounded hover:bg-red-700 transition" data-id="${term.id}">Удалить</button>
                    </td>
                `;
                glossaryTableBody.appendChild(tr);
            });

            // Добавляем обработчики для кнопок редактирования и удаления
            document.querySelectorAll('.edit-term').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    editTerm(id);
                });
            });

            document.querySelectorAll('.delete-term').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    if (confirm('Вы уверены, что хотите удалить этот термин? Это действие нельзя отменить.')) {
                        deleteTerm(id);
                    }
                });
            });
        })
        .catch(error => {
            console.error('Error loading glossary:', error);
            glossaryTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Ошибка загрузки глоссария</td></tr>';
        });
    }

    // Загрузка букв для фильтра
    function loadLetters() {
        fetch('/admin/api/glossary') // Мы получаем все термины, чтобы извлечь уникальные буквы
        .then(response => response.json())
        .then(terms => {
            const letters = [...new Set(terms.map(t => t.letter))].sort();
            letterFilter.innerHTML = '<option value="">Все буквы</option>';
            letters.forEach(letter => {
                const option = document.createElement('option');
                option.value = letter;
                option.textContent = letter;
                letterFilter.appendChild(option);
            });
        })
        .catch(error => {
            console.error('Error loading letters:', error);
        });
    }

    // Инициализация
    loadLetters();
    loadGlossary();

    // Обработчики для фильтра и поиска
    letterFilter.addEventListener('change', loadGlossary);
    searchInput.addEventListener('input', function() {
        // Используем задержку для поиска, чтобы не отправлять запрос при каждом вводе
        clearTimeout(this.timer);
        this.timer = setTimeout(loadGlossary, 300);
    });

    // Автоматическое заполнение буквы при вводе термина
    document.getElementById('termTerm').addEventListener('input', function() {
        const term = this.value.trim();
        if (term && !document.getElementById('termLetter').value) {
            const firstChar = term.charAt(0).toUpperCase();
            if (/[A-ZА-Я]/.test(firstChar)) { // Только буквы латиницы и кириллицы
                document.getElementById('termLetter').value = firstChar;
            }
        }
    });

    // Показать форму для добавления нового термина
    addTermBtn.addEventListener('click', function() {
        formTitle.textContent = 'Добавить новый термин';
        termIdInput.value = '';
        termForm.reset();
        document.getElementById('termLetter').value = '';
        formContainer.classList.remove('hidden');
    });

    // Отмена редактирования/добавления
    cancelTermBtn.addEventListener('click', function() {
        formContainer.classList.add('hidden');
    });

    // Сохранение термина
    termForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const id = termIdInput.value;
        const term = document.getElementById('termTerm').value.trim();
        const definition = document.getElementById('termDefinition').value.trim();
        let letter = document.getElementById('termLetter').value.trim();
        if (!letter) {
            // Если буква не указана, берем первый символ термина
            letter = term ? term.charAt(0).toUpperCase() : '';
        }
        letter = letter.toUpperCase();

        if (!term || !definition || !letter) {
            alert('Пожалуйста, заполните обязательные поля: термин, определение и буква');
            return;
        }

        // Проверяем, что буква - один символ
        if (letter.length !== 1 || !/[A-ZА-Я]/.test(letter)) {
            alert('Буква должна быть одним символом из алфавита (латиница или кириллица)');
            return;
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/admin/api/glossary/${id}` : '/admin/api/glossary';

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
                'term': term,
                'definition': definition,
                'letter': letter
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            alert(id ? 'Термин успешно обновлен' : 'Термин успешно создан');
            loadGlossary();
            formContainer.classList.add('hidden');
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
        });
    });

    // Функция редактирования термина
    function editTerm(id) {
        fetch(`/admin/api/glossary/${id}`)
        .then(response => response.json())
        .then(term => {
            formTitle.textContent = 'Редактировать термин';
            termIdInput.value = term.id;
            document.getElementById('termTerm').value = term.term;
            document.getElementById('termDefinition').value = term.definition;
            document.getElementById('termLetter').value = term.letter;
            formContainer.classList.remove('hidden');
        })
        .catch(error => {
            console.error('Error fetching term:', error);
            alert('Ошибка загрузки термина для редактирования');
        });
    }

    // Функция удаления термина
    function deleteTerm(id) {
        fetch(`/admin/api/glossary/${id}`, {
            method: 'DELETE'
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            alert('Термин успешно удален');
            loadGlossary();
        })
        .catch(error => {
            console.error('Error deleting term:', error);
            alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
        });
    }
});
</script>
{% endblock %}
