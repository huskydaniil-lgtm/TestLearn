{% extends "admin_base.html" %}

{% block admin_content %}
<div class="space-y-6">
    <div class="flex justify-between items-center">
        <h2 class="text-xl font-semibold text-gray-700">Управление темами</h2>
        <button id="addTopicBtn" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition">
            Добавить тему
        </button>
    </div>

    <!-- Фильтр по категории -->
    <div class="mb-4">
        <label for="categoryFilter" class="block text-sm font-medium text-gray-700 mb-1">Фильтр по категории:</label>
        <select id="categoryFilter" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">Все категории</option>
            <!-- Опции будут заполнены через JavaScript -->
        </select>
    </div>

    <!-- Форма добавления/редактирования темы -->
    <div id="topicFormContainer" class="hidden bg-gray-50 p-4 rounded-lg">
        <h3 class="text-lg font-medium text-gray-800 mb-4" id="topicFormTitle">Добавить новую тему</h3>
        <form id="topicForm" class="space-y-4">
            <input type="hidden" id="topicId">
            <div>
                <label for="topicCategory" class="block text-sm font-medium text-gray-700 mb-1">Категория</label>
                <select id="topicCategory" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <!-- Опции будут заполнены через JavaScript -->
                </select>
            </div>
            <div>
                <label for="topicTitle" class="block text-sm font-medium text-gray-700 mb-1">Название</label>
                <input type="text" id="topicTitle" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label for="topicContent" class="block text-sm font-medium text-gray-700 mb-1">Содержание (поддерживается простой Markdown)</label>
                <textarea id="topicContent" rows="10" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div>
                <label for="topicOrder" class="block text-sm font-medium text-gray-700 mb-1">Порядок отображения (число, по умолчанию 0)</label>
                <input type="number" id="topicOrder" value="0" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex justify-end space-x-3">
                <button type="button" id="cancelTopicBtn" class="px-4 py-2 bg-gray-300 text-gray-800 rounded hover:bg-gray-400 transition">Отмена</button>
                <button type="submit" id="saveTopicBtn" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition">Сохранить</button>
            </div>
        </form>
    </div>

    <!-- Список тем -->
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Категория</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Название</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Порядок</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Действия</th>
                </tr>
            </thead>
            <tbody id="topicsTableBody" class="bg-white divide-y divide-gray-200">
                <!-- Строки будут заполнены через JavaScript -->
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const formContainer = document.getElementById('topicFormContainer');
    const formTitle = document.getElementById('topicFormTitle');
    const topicForm = document.getElementById('topicForm');
    const topicIdInput = document.getElementById('topicId');
    const addTopicBtn = document.getElementById('addTopicBtn');
    const cancelTopicBtn = document.getElementById('cancelTopicBtn');
    const saveTopicBtn = document.getElementById('saveTopicBtn');
    const categoryFilter = document.getElementById('categoryFilter');
    const topicsTableBody = document.getElementById('topicsTableBody');

    let categories = []; // Для хранения списка категорий

    // Загрузка категорий для выпадающих списков
    function loadCategoriesForDropdowns() {
        fetch('/api/categories')
        .then(response => response.json())
        .then(data => {
            categories = data;
            // Заполняем выпадающий список для фильтра
            categoryFilter.innerHTML = '<option value="">Все категории</option>';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                categoryFilter.appendChild(option);
            });
            // Заполняем выпадающий список в форме
            const topicCategorySelect = document.getElementById('topicCategory');
            topicCategorySelect.innerHTML = '';
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = cat.name;
                topicCategorySelect.appendChild(option);
            });
        })
        .catch(error => {
            console.error('Error loading categories:', error);
        });
    }

    // Загрузка тем при загрузке страницы или изменении фильтра
    function loadTopics() {
        const categoryId = categoryFilter.value;
        let url = '/admin/api/topics';
        if (categoryId) {
            url += `?category_id=${categoryId}`;
        }
        fetch(url)
        .then(response => response.json())
        .then(topics => {
            topicsTableBody.innerHTML = '';
            topics.forEach(topic => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">${topic.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${topic.category_name}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${topic.title}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${topic.order_num}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                        <button class="edit-topic btn px-2 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition mr-2" data-id="${topic.id}">Редактировать</button>
                        <button class="delete-topic btn px-2 py-1 bg-red-600 text-white rounded hover:bg-red-700 transition" data-id="${topic.id}">Удалить</button>
                    </td>
                `;
                topicsTableBody.appendChild(tr);
            });

            // Добавляем обработчики для кнопок редактирования и удаления
            document.querySelectorAll('.edit-topic').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    editTopic(id);
                });
            });

            document.querySelectorAll('.delete-topic').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.getAttribute('data-id');
                    if (confirm('Вы уверены, что хотите удалить эту тему? Это действие нельзя отменить.')) {
                        deleteTopic(id);
                    }
                });
            });
        })
        .catch(error => {
            console.error('Error loading topics:', error);
            topicsTableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Ошибка загрузки тем</td></tr>';
        });
    }

    // Инициализация
    loadCategoriesForDropdowns();
    loadTopics();

    // Обработчик изменения фильтра
    categoryFilter.addEventListener('change', loadTopics);

    // Показать форму для добавления новой темы
    addTopicBtn.addEventListener('click', function() {
        formTitle.textContent = 'Добавить новую тему';
        topicIdInput.value = '';
        topicForm.reset();
        document.getElementById('topicOrder').value = '0';
        formContainer.classList.remove('hidden');
    });

    // Отмена редактирования/добавления
    cancelTopicBtn.addEventListener('click', function() {
        formContainer.classList.add('hidden');
    });

    // Сохранение темы
    topicForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const id = topicIdInput.value;
        const categoryId = document.getElementById('topicCategory').value;
        const title = document.getElementById('topicTitle').value.trim();
        const content = document.getElementById('topicContent').value.trim();
        const orderNum = parseInt(document.getElementById('topicOrder').value) || 0;

        if (!categoryId || !title || !content) {
            alert('Пожалуйста, заполните обязательные поля: категория, название и содержание');
            return;
        }

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/admin/api/topics/${id}` : '/admin/api/topics';

        fetch(url, {
            method: method,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: new URLSearchParams({
                'category_id': categoryId,
                'title': title,
                'content': content,
                'order_num': orderNum
            })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            alert(id ? 'Тема успешно обновлена' : 'Тема успешно создана');
            loadTopics();
            formContainer.classList.add('hidden');
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
        });
    });

    // Функция редактирования темы
    function editTopic(id) {
        fetch(`/admin/api/topics/${id}`)
        .then(response => response.json())
        .then(topic => {
            formTitle.textContent = 'Редактировать тему';
            topicIdInput.value = topic.id;
            document.getElementById('topicCategory').value = topic.category_id;
            document.getElementById('topicTitle').value = topic.title;
            document.getElementById('topicContent').value = topic.content;
            document.getElementById('topicOrder').value = topic.order_num;
            formContainer.classList.remove('hidden');
        })
        .catch(error => {
            console.error('Error fetching topic:', error);
            alert('Ошибка загрузки темы для редактирования');
        });
    }

    // Функция удаления темы
    function deleteTopic(id) {
        fetch(`/admin/api/topics/${id}`, {
            method: 'DELETE'
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw err; });
            }
            return response.json();
        })
        .then(data => {
            alert('Тема успешно удалена');
            loadTopics();
        })
        .catch(error => {
            console.error('Error deleting topic:', error);
            alert('Ошибка: ' + (error.detail || 'Неизвестная ошибка'));
        });
    }
});
</script>
{% endblock %}
